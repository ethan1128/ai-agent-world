<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产出内容</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f1115;
            --bg-secondary: #161920;
            --bg-card: #1c1f28;
            --bg-hover: #232732;
            --accent-primary: #3b82f6;
            --accent-success: #10b981;
            --accent-warning: #f59e0b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-color: #2d3342;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container { max-width: 1400px; margin: 0 auto; }
        
        header {
            margin-bottom: 30px;
            padding: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
        }
        
        .header-title { font-size: 1.5em; font-weight: 600; margin-bottom: 10px; }
        .header-subtitle { color: var(--text-secondary); font-size: 0.9em; }
        
        .back-btn {
            display: inline-block;
            padding: 8px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9em;
            transition: all 0.2s;
            margin-top: 10px;
        }
        
        .back-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
        
        .filter-section {
            margin-bottom: 30px;
            padding: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
        }
        
        .filter-title {
            font-size: 1em;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--accent-primary);
        }
        
        .filter-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 8px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .filter-btn:hover {
            background: var(--bg-hover);
            border-color: var(--accent-primary);
        }
        
        .filter-btn.active {
            background: var(--accent-primary);
            color: white;
            border-color: var(--accent-primary);
        }
        
        .filter-count {
            background: rgba(255,255,255,0.2);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.8em;
        }
        
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }
        
        .stat-value { font-size: 2em; font-weight: 700; color: var(--accent-primary); }
        .stat-label { font-size: 0.85em; color: var(--text-secondary); margin-top: 5px; }
        
        .employee-section {
            margin-bottom: 40px;
        }
        
        .employee-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--border-color);
        }
        
        .employee-avatar { font-size: 2.5em; }
        .employee-name { font-size: 1.3em; font-weight: 600; }
        .employee-role { font-size: 0.9em; color: var(--text-secondary); margin-left: 10px; }
        .employee-count { 
            margin-left: auto;
            padding: 6px 14px;
            background: var(--accent-primary);
            color: white;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 500;
        }
        
        .content-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 20px;
        }
        
        .content-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 20px;
            transition: all 0.2s;
        }
        
        .content-card:hover {
            border-color: var(--accent-primary);
            transform: translateY(-2px);
        }
        
        .content-title {
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 10px;
            line-height: 1.4;
        }
        
        .content-meta {
            display: flex;
            gap: 15px;
            font-size: 0.8em;
            color: var(--text-secondary);
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .content-status {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.75em;
            font-weight: 500;
        }
        
        .status-draft { background: rgba(245, 158, 11, 0.15); color: var(--accent-warning); }
        .status-published { background: rgba(16, 185, 129, 0.15); color: var(--accent-success); }
        
        .content-preview {
            background: var(--bg-secondary);
            padding: 15px;
            border-radius: 6px;
            font-size: 0.85em;
            color: var(--text-secondary);
            line-height: 1.6;
            max-height: 150px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        
        .loading { text-align: center; padding: 50px; color: var(--text-secondary); }
        .empty { text-align: center; padding: 80px 20px; color: var(--text-secondary); }
        .empty-icon { font-size: 4em; margin-bottom: 20px; opacity: 0.3; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-title">📄 产出内容</div>
            <div class="header-subtitle">查看 AI 员工创作的所有内容</div>
            <div style="display: flex; gap: 15px; margin-top: 15px; align-items: center; flex-wrap: wrap;">
                <div style="display: flex; align-items: center; gap: 8px; font-size: 0.85em; color: var(--text-secondary);">
                    <span>🕐</span>
                    <span id="current-time">--:--:--</span>
                </div>
                <div style="display: flex; align-items: center; gap: 8px; font-size: 0.85em; color: var(--text-secondary);">
                    <span>👁️</span>
                    <span>访问次数：<strong id="visit-count" style="color: var(--accent-primary);">0</strong></span>
                </div>
                <a href="/employee-dashboard.html" class="back-btn" style="margin-top: 0;">← 返回仪表板</a>
            </div>
        </header>
        
        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-value" id="stat-total">0</div>
                <div class="stat-label">📄 总内容</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-employees">0</div>
                <div class="stat-label">👥 员工数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-published">0</div>
                <div class="stat-label">✅ 已发布</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-draft">0</div>
                <div class="stat-label">📝 草稿</div>
            </div>
        </div>
        
        <div class="filter-section">
            <div class="filter-title">🔍 按员工筛选</div>
            <div class="filter-buttons" id="filter-buttons">
                <button class="filter-btn active" data-employee="all">
                    📄 全部 <span class="filter-count" id="count-all">0</span>
                </button>
            </div>
        </div>
        
        <div id="content-container">
            <div class="loading">加载内容...</div>
        </div>
    </div>
    
    <script>
        let allContent = [];
        let employees = {};
        let currentFilter = 'all';
        
        function loadContent() {
            Promise.all([
                fetch('/api/content').then(r => r.json()),
                fetch('/api/employees').then(r => r.json())
            ])
            .then(([contentData, employeesData]) => {
                allContent = contentData.content || [];
                employees = {};
                employeesData.employees.forEach(emp => {
                    employees[emp.id] = emp;
                });
                
                // 按员工分组
                const grouped = {};
                allContent.forEach(item => {
                    const empId = item.created_by || 'unknown';
                    if (!grouped[empId]) grouped[empId] = [];
                    grouped[empId].push(item);
                });
                
                // 更新统计
                updateStats(grouped);
                
                // 更新筛选按钮
                updateFilterButtons(grouped);
                
                // 渲染内容
                renderContent(grouped);
            })
            .catch(err => {
                console.error(err);
                document.getElementById('content-container').innerHTML = '<div class="empty">❌ 加载失败</div>';
            });
        }
        
        function updateStats(grouped) {
            const total = allContent.length;
            const empCount = Object.keys(grouped).length;
            const published = allContent.filter(c => c.status === 'published').length;
            const draft = allContent.filter(c => c.status === 'draft').length;
            
            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-employees').textContent = empCount;
            document.getElementById('stat-published').textContent = published;
            document.getElementById('stat-draft').textContent = draft;
            
            document.getElementById('count-all').textContent = total;
        }
        
        function updateFilterButtons(grouped) {
            const container = document.getElementById('filter-buttons');
            
            // 保留"全部"按钮，添加员工筛选按钮
            Object.keys(grouped).forEach(empId => {
                const emp = employees[empId];
                const count = grouped[empId].length;
                
                const existing = container.querySelector(`[data-employee="${empId}"]`);
                if (!existing) {
                    const btn = document.createElement('button');
                    btn.className = 'filter-btn';
                    btn.dataset.employee = empId;
                    btn.innerHTML = `
                        ${emp ? emp.avatar : '👤'} 
                        ${emp ? emp.name : '未知员工'}
                        <span class="filter-count">${count}</span>
                    `;
                    btn.onclick = function() {
                        filterContent(empId);
                    };
                    container.appendChild(btn);
                } else {
                    existing.querySelector('.filter-count').textContent = count;
                }
            });
        }
        
        function filterContent(employeeId) {
            currentFilter = employeeId;
            
            // 更新按钮状态
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.employee === employeeId);
            });
            
            // 重新渲染
            const grouped = {};
            allContent.forEach(item => {
                const empId = item.created_by || 'unknown';
                if (!grouped[empId]) grouped[empId] = [];
                grouped[empId].push(item);
            });
            
            renderContent(grouped);
        }
        
        function renderContent(grouped) {
            const container = document.getElementById('content-container');
            
            if (currentFilter === 'all') {
                // 显示所有员工的内容
                let html = '';
                Object.keys(grouped).forEach(empId => {
                    const emp = employees[empId];
                    const contents = grouped[empId];
                    
                    html += `
                        <div class="employee-section">
                            <div class="employee-header">
                                <div class="employee-avatar">${emp ? emp.avatar : '👤'}</div>
                                <div>
                                    <div class="employee-name">${emp ? emp.name : '未知员工'}</div>
                                    <div class="employee-role">${emp ? emp.role : '未知角色'}</div>
                                </div>
                                <div class="employee-count">${contents.length} 条内容</div>
                            </div>
                            <div class="content-list">
                                ${contents.map(item => renderContentCard(item)).join('')}
                            </div>
                        </div>
                    `;
                });
                
                container.innerHTML = html || '<div class="empty"><div class="empty-icon">📄</div><h3>暂无产出内容</h3><p>等待 AI 员工创作文案...</p></div>';
            } else {
                // 显示指定员工的内容
                const contents = grouped[currentFilter] || [];
                const emp = employees[currentFilter];
                
                if (contents.length === 0) {
                    container.innerHTML = '<div class="empty"><div class="empty-icon">📄</div><h3>该员工暂无产出内容</h3></div>';
                    return;
                }
                
                container.innerHTML = `
                    <div class="employee-section">
                        <div class="employee-header">
                            <div class="employee-avatar">${emp ? emp.avatar : '👤'}</div>
                            <div>
                                <div class="employee-name">${emp ? emp.name : '未知员工'}</div>
                                <div class="employee-role">${emp ? emp.role : '未知角色'}</div>
                            </div>
                            <div class="employee-count">${contents.length} 条内容</div>
                        </div>
                        <div class="content-list">
                            ${contents.map(item => renderContentCard(item)).join('')}
                        </div>
                    </div>
                `;
            }
        }
        
        function renderContentCard(item) {
            return `
                <div class="content-card">
                    <div class="content-title">${escapeHtml(item.title || '无标题')}</div>
                    <div class="content-meta">
                        <span>📅 ${formatDate(item.created_at)}</span>
                        <span>📊 ${item.platform || '未知'}</span>
                        <span>👁️ ${item.metrics_views || 0}</span>
                    </div>
                    <div style="margin-bottom: 10px;">
                        <span class="content-status status-${item.status || 'draft'}">
                            ${item.status === 'published' ? '✅ 已发布' : '📝 草稿'}
                        </span>
                    </div>
                    <div class="content-preview">${escapeHtml(item.body || '无内容')}</div>
                </div>
            `;
        }
        
        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            return date.toLocaleString('zh-CN', {
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 初始加载
        loadContent();
        
        // 更新时间组件
        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-CN', { 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit' 
            });
            document.getElementById('current-time').textContent = timeStr;
        }
        
        // 更新访问次数
        function updateVisitCount() {
            const storageKey = 'content-page-visit-count';
            let count = parseInt(localStorage.getItem(storageKey) || '0');
            count++;
            localStorage.setItem(storageKey, count.toString());
            document.getElementById('visit-count').textContent = count;
        }
        
        // 每秒更新时间
        setInterval(updateTime, 1000);
        updateTime();
        
        // 更新访问次数
        updateVisitCount();
    </script>
</body>
</html>

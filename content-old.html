<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 员工世界 - 内容管理</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a25;
            --accent-cyan: #00f0ff;
            --accent-pink: #ff00ff;
            --accent-green: #00ff88;
            --accent-yellow: #ffcc00;
            --text-primary: #ffffff;
            --text-secondary: #8888aa;
            --border-color: #2a2a3a;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: var(--bg-secondary);
            border: 2px solid var(--accent-cyan);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
        }
        
        h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.5em;
            color: var(--accent-cyan);
            text-shadow: 0 0 10px var(--accent-cyan);
            margin-bottom: 15px;
        }
        
        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
        }
        
        .nav-tab {
            padding: 12px 25px;
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.7em;
        }
        
        .nav-tab:hover {
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
        }
        
        .nav-tab.active {
            background: var(--accent-cyan);
            color: var(--bg-primary);
            border-color: var(--accent-cyan);
        }
        
        .content-section {
            display: none;
        }
        
        .content-section.active {
            display: block;
        }
        
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .content-card {
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            padding: 25px;
            position: relative;
            transition: all 0.3s ease;
        }
        
        .content-card:hover {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
        }
        
        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .content-title {
            font-size: 1.1em;
            color: var(--accent-cyan);
            margin-bottom: 5px;
        }
        
        .content-meta {
            font-size: 0.75em;
            color: var(--text-secondary);
        }
        
        .content-status {
            padding: 5px 12px;
            border-radius: 3px;
            font-size: 0.7em;
            text-transform: uppercase;
        }
        
        .status-draft {
            background: rgba(255, 204, 0, 0.2);
            color: var(--accent-yellow);
            border: 1px solid var(--accent-yellow);
        }
        
        .status-published {
            background: rgba(0, 255, 136, 0.2);
            color: var(--accent-green);
            border: 1px solid var(--accent-green);
        }
        
        .content-body {
            background: var(--bg-secondary);
            padding: 15px;
            border-left: 3px solid var(--accent-pink);
            margin-bottom: 15px;
            font-size: 0.85em;
            line-height: 1.6;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .content-footer {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .tag {
            background: var(--bg-secondary);
            padding: 5px 10px;
            font-size: 0.7em;
            color: var(--accent-cyan);
            border: 1px solid var(--accent-cyan);
        }
        
        .score-bar {
            margin: 10px 0;
        }
        
        .score-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.75em;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }
        
        .score-fill {
            height: 6px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
        }
        
        .score-fill-inner {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-green));
            transition: width 0.5s ease;
        }
        
        .btn {
            padding: 8px 16px;
            background: var(--accent-cyan);
            color: var(--bg-primary);
            border: none;
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8em;
            transition: all 0.3s ease;
        }
        
        .btn:hover {
            background: var(--accent-pink);
            color: var(--text-primary);
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: var(--accent-cyan);
        }
        
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-secondary);
        }
        
        .empty-state-icon {
            font-size: 4em;
            margin-bottom: 20px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 AI 员工世界 - 内容管理</h1>
            <p style="color: var(--text-secondary);">查看和管理 AI 生成的内容</p>
        </header>
        
        <div class="nav-tabs">
            <div class="nav-tab active" onclick="switchTab('content')">📄 内容列表</div>
            <div class="nav-tab" onclick="switchTab('workflow')">📊 工作流记录</div>
            <div class="nav-tab" onclick="location.href='/'">🤖 监控面板</div>
        </div>
        
        <!-- 内容列表 -->
        <div id="content-section" class="content-section active">
            <div class="content-grid" id="content-grid">
                <div class="loading">正在加载内容...</div>
            </div>
        </div>
        
        <!-- 工作流记录 -->
        <div id="workflow-section" class="content-section">
            <div class="content-grid" id="workflow-grid">
                <div class="loading">正在加载工作流记录...</div>
            </div>
        </div>
    </div>
    
    <script>
        function switchTab(tab) {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tab + '-section').classList.add('active');
            
            if (tab === 'content') loadContent();
            if (tab === 'workflow') loadWorkflow();
        }
        
        function loadContent() {
            fetch('/api/content')
                .then(r => r.json())
                .then(data => {
                    const grid = document.getElementById('content-grid');
                    
                    if (!data.content || data.content.length === 0) {
                        grid.innerHTML = `
                            <div class="empty-state">
                                <div class="empty-state-icon">📝</div>
                                <p>暂无内容</p>
                                <p style="margin-top: 10px; font-size: 0.8em;">运行 workflow.py 生成内容</p>
                            </div>
                        `;
                        return;
                    }
                    
                    grid.innerHTML = data.content.map(item => `
                        <div class="content-card">
                            <div class="content-header">
                                <div>
                                    <div class="content-title">${item.title}</div>
                                    <div class="content-meta">
                                        创作者：${item.creator_name || '未知'} | 
                                        平台：${item.platform} | 
                                        ${formatTime(item.created_at)}
                                    </div>
                                </div>
                                <div class="content-status status-${item.status}">${item.status}</div>
                            </div>
                            <div class="content-body">${item.body || '(JSON 数据)'}</div>
                            ${item.metadata ? renderMetadata(item.metadata) : ''}
                            <div class="btn-group">
                                <button class="btn" onclick="alert('复制成功！')">📋 复制</button>
                                <button class="btn" onclick="alert('发布功能开发中...')">🚀 发布</button>
                                <button class="btn" onclick="alert('编辑功能开发中...')">✏️ 编辑</button>
                            </div>
                        </div>
                    `).join('');
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById('content-grid').innerHTML = '<div class="loading">加载失败</div>';
                });
        }
        
        function renderMetadata(metadata) {
            try {
                const meta = typeof metadata === 'string' ? JSON.parse(metadata) : metadata;
                
                if (meta.scores) {
                    return `
                        <div style="margin-top: 15px;">
                            <div style="font-size: 0.75em; color: var(--text-secondary); margin-bottom: 10px;">审核评分</div>
                            ${renderScore('积极性', meta.scores.positive)}
                            ${renderScore('合规性', meta.scores.compliance)}
                            ${renderScore('吸引力', meta.scores.appeal)}
                            <div style="margin-top: 10px; font-size: 0.8em; color: ${meta.passed ? 'var(--accent-green)' : 'var(--accent-pink)'}">
                                ${meta.passed ? '✅ 通过审核' : '❌ 未通过'} - ${meta.feedback || meta.reason || ''}
                            </div>
                        </div>
                    `;
                }
                
                if (meta.topics) {
                    return `
                        <div style="margin-top: 15px;">
                            <div style="font-size: 0.75em; color: var(--text-secondary); margin-bottom: 10px;">热点话题 (${meta.topics.length}个)</div>
                            ${meta.topics.map((t, i) => `
                                <div style="font-size: 0.8em; margin-bottom: 8px; padding: 8px; background: var(--bg-secondary);">
                                    <strong>${i+1}. ${t.title}</strong><br>
                                    <span style="color: var(--text-secondary)">${t.reason}</span>
                                </div>
                            `).join('')}
                        </div>
                    `;
                }
                
                if (meta.patterns) {
                    return `
                        <div style="margin-top: 15px;">
                            <div style="font-size: 0.75em; color: var(--text-secondary); margin-bottom: 10px;">爆款模式 (${meta.patterns.length}个)</div>
                            ${meta.patterns.map((p, i) => `
                                <div style="font-size: 0.8em; margin-bottom: 5px;">${i+1}. ${p}</div>
                            `).join('')}
                        </div>
                    `;
                }
                
                return '';
            } catch (e) {
                return '';
            }
        }
        
        function renderScore(label, value) {
            return `
                <div class="score-bar">
                    <div class="score-label">
                        <span>${label}</span>
                        <span>${value}分</span>
                    </div>
                    <div class="score-fill">
                        <div class="score-fill-inner" style="width: ${value}%"></div>
                    </div>
                </div>
            `;
        }
        
        function loadWorkflow() {
            fetch('/api/events?limit=20')
                .then(r => r.json())
                .then(data => {
                    const grid = document.getElementById('workflow-grid');
                    
                    if (!data.events || data.events.length === 0) {
                        grid.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📊</div><p>暂无工作流记录</p></div>';
                        return;
                    }
                    
                    grid.innerHTML = data.events.map(event => {
                        const eventData = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
                        return `
                            <div class="content-card">
                                <div class="content-header">
                                    <div>
                                        <div class="content-title">🔄 工作流执行</div>
                                        <div class="content-meta">${formatTime(event.created_at)}</div>
                                    </div>
                                    <div class="content-status status-published">完成</div>
                                </div>
                                <div style="font-size: 0.85em; line-height: 2;">
                                    ⏱️ 耗时：<strong style="color: var(--accent-cyan)">${eventData.duration?.toFixed(1) || 0}秒</strong><br>
                                    ✅ 成功：<strong style="color: var(--accent-green)">${eventData.success || 0}/${eventData.total || 0}</strong><br>
                                    📊 成功率：<strong>${Math.round((eventData.success / eventData.total) * 100) || 0}%</strong>
                                </div>
                            </div>
                        `;
                    }).join('');
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById('workflow-grid').innerHTML = '<div class="loading">加载失败</div>';
                });
        }
        
        function formatTime(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleString('zh-CN', {
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
        
        // 初始加载
        loadContent();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 员工世界 - 实时监控</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a25;
            --accent-cyan: #00f0ff;
            --accent-pink: #ff00ff;
            --accent-green: #00ff88;
            --accent-yellow: #ffcc00;
            --text-primary: #ffffff;
            --text-secondary: #8888aa;
            --border-color: #2a2a3a;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        
        /* Header */
        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: var(--bg-secondary);
            border: 2px solid var(--accent-cyan);
            border-radius: 0;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
            animation: scan 2s linear infinite;
        }
        
        @keyframes scan {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.8em;
            color: var(--accent-cyan);
            text-shadow: 0 0 10px var(--accent-cyan);
            margin-bottom: 15px;
            letter-spacing: 2px;
        }
        
        .subtitle {
            color: var(--text-secondary);
            font-size: 0.9em;
        }
        
        .live-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: var(--accent-green);
            box-shadow: 0 0 10px var(--accent-green);
            animation: pulse 1s infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        /* Status Bar */
        .status-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .status-card {
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            padding: 25px;
            text-align: center;
            position: relative;
            transition: all 0.3s ease;
        }
        
        .status-card:hover {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
        }
        
        .status-card .number {
            font-family: 'Press Start 2P', cursive;
            font-size: 2.5em;
            color: var(--accent-cyan);
            margin-bottom: 10px;
        }
        
        .status-card .label {
            color: var(--text-secondary);
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* Agents Grid */
        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }
        
        .agent-card {
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            padding: 0;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .agent-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--accent-cyan);
        }
        
        .agent-card.status-busy::before {
            background: var(--accent-pink);
        }
        
        .agent-card:hover {
            border-color: var(--accent-cyan);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 240, 255, 0.2);
        }
        
        .agent-avatar {
            width: 100%;
            height: 150px;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 2px solid var(--border-color);
            image-rendering: pixelated;
        }
        
        .agent-avatar img {
            width: 80px;
            height: 80px;
            image-rendering: pixelated;
        }
        
        .agent-avatar-placeholder {
            font-size: 4em;
            filter: drop-shadow(0 0 10px var(--accent-cyan));
        }
        
        .agent-info {
            padding: 20px;
        }
        
        .agent-name {
            font-family: 'Press Start 2P', cursive;
            font-size: 1em;
            color: var(--accent-cyan);
            margin-bottom: 8px;
        }
        
        .agent-role {
            color: var(--text-secondary);
            font-size: 0.85em;
            margin-bottom: 15px;
        }
        
        .agent-status-badge {
            display: inline-block;
            padding: 5px 12px;
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid;
            margin-bottom: 15px;
        }
        
        .status-idle {
            background: rgba(0, 255, 136, 0.1);
            border-color: var(--accent-green);
            color: var(--accent-green);
        }
        
        .status-busy {
            background: rgba(255, 0, 255, 0.1);
            border-color: var(--accent-pink);
            color: var(--accent-pink);
        }
        
        .agent-task {
            background: var(--bg-secondary);
            padding: 15px;
            border-left: 3px solid var(--accent-cyan);
        }
        
        .agent-task h4 {
            color: var(--text-secondary);
            font-size: 0.75em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        
        .agent-task p {
            font-size: 0.85em;
            line-height: 1.6;
        }
        
        .progress-container {
            margin-top: 15px;
        }
        
        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.75em;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }
        
        .progress-bar {
            height: 8px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-pink));
            box-shadow: 0 0 10px var(--accent-cyan);
            transition: width 0.5s ease;
        }
        
        /* Activity Log */
        .activity-section {
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            padding: 25px;
        }
        
        .activity-section h3 {
            font-family: 'Press Start 2P', cursive;
            font-size: 1em;
            color: var(--accent-cyan);
            margin-bottom: 20px;
        }
        
        .log-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .log-item {
            display: flex;
            align-items: flex-start;
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            transition: background 0.3s ease;
        }
        
        .log-item:hover {
            background: var(--bg-secondary);
        }
        
        .log-avatar {
            font-size: 2em;
            margin-right: 15px;
            filter: drop-shadow(0 0 5px var(--accent-cyan));
        }
        
        .log-content {
            flex: 1;
        }
        
        .log-agent {
            color: var(--accent-cyan);
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .log-message {
            color: var(--text-secondary);
            font-size: 0.85em;
            line-height: 1.5;
        }
        
        .log-time {
            color: var(--text-secondary);
            font-size: 0.75em;
            margin-left: 15px;
            white-space: nowrap;
        }
        
        /* Scanline Effect */
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: rgba(0, 240, 255, 0.1);
            animation: scanline 3s linear infinite;
            pointer-events: none;
            z-index: 9999;
        }
        
        @keyframes scanline {
            0% { transform: translateY(-100vh); }
            100% { transform: translateY(100vh); }
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--accent-cyan);
        }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 50px;
            color: var(--accent-cyan);
        }
        
        .loading::after {
            content: '...';
            animation: dots 1.5s infinite;
        }
        
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.2em;
            }
            
            .agents-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="scanline"></div>
    
    <div class="container">
        <header>
            <h1>🤖 AI 员工世界</h1>
            <p class="subtitle">
                <span class="live-indicator"></span>
                实时监控系统 · 数据每 5 秒自动刷新
            </p>
        </header>
        
        <div class="status-bar">
            <div class="status-card">
                <div class="number" id="total-agents">4</div>
                <div class="label">AI 员工</div>
            </div>
            <div class="status-card">
                <div class="number" id="active-tasks">0</div>
                <div class="label">进行中</div>
            </div>
            <div class="status-card">
                <div class="number" id="completed-today">0</div>
                <div class="label">今日完成</div>
            </div>
            <div class="status-card">
                <div class="number" id="content-created">0</div>
                <div class="label">内容产出</div>
            </div>
        </div>
        
        <div class="agents-grid" id="agents-grid">
            <div class="loading">正在加载 AI 员工状态</div>
        </div>
        
        <div class="activity-section">
            <h3>📋 活动日志</h3>
            <div class="log-list" id="log-list">
                <div class="loading">正在加载活动日志</div>
            </div>
        </div>
    </div>
    
    <script>
        // 4 个核心 AI 员工
        const agents = [
            { id: 1, name: '天枢', role: '研究主管', avatar: '🧙', status: 'idle', current_task: null, progress: 0 },
            { id: 2, name: '地衡', role: '情报收集', avatar: '🔍', status: 'idle', current_task: null, progress: 0 },
            { id: 3, name: '文曲', role: '内容创作', avatar: '✍️', status: 'idle', current_task: null, progress: 0 },
            { id: 4, name: '明镜', role: '质量审核', avatar: '👁️', status: 'idle', current_task: null, progress: 0 }
        ];
        
        const taskPool = [
            '收集中老年情感热点话题',
            '监控竞品账号爆款内容',
            '撰写情感类文案草稿',
            '审核内容质量和合规性',
            '分析用户画像和偏好',
            '生成发布内容包'
        ];
        
        const logs = [
            { agent_id: 1, agent_name: '天枢', avatar: '🧙', message: '系统初始化完成，准备开始工作', time: new Date() },
            { agent_id: 2, agent_name: '地衡', avatar: '🔍', message: '系统初始化完成，准备开始工作', time: new Date() },
            { agent_id: 3, agent_name: '文曲', avatar: '✍️', message: '系统初始化完成，准备开始工作', time: new Date() },
            { agent_id: 4, agent_name: '明镜', avatar: '👁️', message: '系统初始化完成，准备开始工作', time: new Date() }
        ];
        
        function renderAgents() {
            const grid = document.getElementById('agents-grid');
            grid.innerHTML = agents.map(agent => `
                <div class="agent-card status-${agent.status}">
                    <div class="agent-avatar">
                        <div class="agent-avatar-placeholder">${agent.avatar}</div>
                    </div>
                    <div class="agent-info">
                        <div class="agent-name">${agent.name}</div>
                        <div class="agent-role">${agent.role}</div>
                        <div class="agent-status-badge status-${agent.status}">
                            ${agent.status === 'idle' ? '🟢 待机' : '🔴 工作中'}
                        </div>
                        <div class="agent-task">
                            <h4>当前任务</h4>
                            <p>${agent.current_task || '暂无任务'}</p>
                        </div>
                        ${agent.progress > 0 ? `
                            <div class="progress-container">
                                <div class="progress-label">
                                    <span>进度</span>
                                    <span>${agent.progress}%</span>
                                </div>
                                <div class="progress-bar">
                                    <div class="progress-fill" style="width: ${agent.progress}%"></div>
                                </div>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }
        
        function renderLogs() {
            const list = document.getElementById('log-list');
            list.innerHTML = logs.slice(0, 20).map(log => `
                <div class="log-item">
                    <div class="log-avatar">${log.avatar}</div>
                    <div class="log-content">
                        <div class="log-agent">${log.agent_name}</div>
                        <div class="log-message">${log.message}</div>
                    </div>
                    <div class="log-time">${formatTime(log.time)}</div>
                </div>
            `).join('');
        }
        
        function formatTime(date) {
            return new Date(date).toLocaleTimeString('zh-CN', { 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit' 
            });
        }
        
        function updateStats() {
            const activeTasks = agents.filter(a => a.status === 'busy').length;
            document.getElementById('active-tasks').textContent = activeTasks;
            document.getElementById('completed-today').textContent = Math.floor(Math.random() * 10);
            document.getElementById('content-created').textContent = Math.floor(Math.random() * 5);
        }
        
        function simulateWork() {
            // 随机让一个空闲的 AI 员工开始工作
            const idleAgents = agents.filter(a => a.status === 'idle');
            if (idleAgents.length > 0 && Math.random() > 0.6) {
                const agent = idleAgents[Math.floor(Math.random() * idleAgents.length)];
                agent.status = 'busy';
                agent.current_task = taskPool[agent.id - 1];
                agent.progress = 0;
                
                logs.unshift({
                    agent_id: agent.id,
                    agent_name: agent.name,
                    avatar: agent.avatar,
                    message: `开始任务：${agent.current_task}`,
                    time: new Date()
                });
            }
            
            // 更新工作中的 AI 员工进度
            agents.filter(a => a.status === 'busy').forEach(agent => {
                agent.progress += Math.floor(Math.random() * 20);
                if (agent.progress >= 100) {
                    agent.status = 'idle';
                    agent.progress = 0;
                    agent.current_task = null;
                    
                    logs.unshift({
                        agent_id: agent.id,
                        agent_name: agent.name,
                        avatar: agent.avatar,
                        message: `任务完成`,
                        time: new Date()
                    });
                }
            });
            
            if (logs.length > 50) logs.pop();
        }
        
        function loadData() {
            simulateWork();
            renderAgents();
            renderLogs();
            updateStats();
        }
        
        // 初始加载
        loadData();
        
        // 每 5 秒刷新
        setInterval(loadData, 5000);
    </script>
</body>
</html>

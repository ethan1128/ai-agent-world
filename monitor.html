<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时监控 - AI Agent World</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f1115;
            --bg-secondary: #161920;
            --bg-card: #1c1f28;
            --bg-hover: #232732;
            --accent-primary: #3b82f6;
            --accent-success: #10b981;
            --accent-warning: #f59e0b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-color: #2d3342;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container { max-width: 1400px; margin: 0 auto; }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
        }
        
        .header-left h1 {
            font-size: 1.5em;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .header-left p {
            color: var(--text-secondary);
            font-size: 0.9em;
        }
        
        .back-btn {
            padding: 10px 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            text-decoration: none;
            font-size: 0.9em;
            transition: all 0.2s;
        }
        
        .back-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 2em;
            font-weight: 700;
            color: var(--text-primary);
        }
        
        .stat-label {
            font-size: 0.85em;
            color: var(--text-secondary);
            margin-top: 5px;
        }
        
        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .agent-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 24px;
            transition: all 0.2s;
        }
        
        .agent-card:hover {
            border-color: var(--accent-primary);
        }
        
        .agent-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .agent-avatar {
            font-size: 2.5em;
            margin-right: 15px;
        }
        
        .agent-info h3 {
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 3px;
        }
        
        .agent-role {
            color: var(--text-secondary);
            font-size: 0.85em;
        }
        
        .agent-status {
            margin-left: auto;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.75em;
            font-weight: 500;
        }
        
        .status-idle {
            background: rgba(16, 185, 129, 0.15);
            color: var(--accent-success);
        }
        
        .status-busy {
            background: rgba(245, 158, 11, 0.15);
            color: var(--accent-warning);
        }
        
        .agent-task {
            background: var(--bg-secondary);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        
        .agent-task h4 {
            color: var(--text-muted);
            font-size: 0.75em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        
        .agent-task p {
            font-size: 0.9em;
            line-height: 1.5;
        }
        
        .progress-bar {
            height: 6px;
            background: var(--bg-secondary);
            border-radius: 3px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: var(--accent-primary);
            transition: width 0.5s;
        }
        
        .activity-section {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 24px;
        }
        
        .activity-section h3 {
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 20px;
        }
        
        .log-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .log-item {
            display: flex;
            align-items: flex-start;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
        }
        
        .log-item:last-child { border-bottom: none; }
        
        .log-avatar {
            font-size: 1.5em;
            margin-right: 12px;
        }
        
        .log-content { flex: 1; }
        
        .log-agent {
            font-weight: 500;
            margin-bottom: 3px;
        }
        
        .log-message {
            color: var(--text-secondary);
            font-size: 0.85em;
        }
        
        .log-time {
            color: var(--text-muted);
            font-size: 0.75em;
            margin-left: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <h1>📊 实时监控</h1>
                <p>AI 员工工作状态 · 每 5 秒自动刷新</p>
            </div>
            <a href="/" class="back-btn">← 返回首页</a>
        </header>
        <div style="margin-bottom: 20px; padding: 15px; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px; font-size: 0.85em;">
            <div style="display: flex; justify-content: space-between; flex-wrap: wrap; gap: 15px;">
                <div>🕐 当前时间：<strong id="current-time">加载中...</strong></div>
                <div>🕐 最后抓取：<strong id="last-crawl">加载中...</strong></div>
                <div>🕐 下次抓取：<strong id="next-crawl">加载中...</strong></div>
            </div>
        </div>
        
        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-value" id="total-agents">4</div>
                <div class="stat-label">AI 员工</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="active-tasks">0</div>
                <div class="stat-label">进行中</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="completed-today">0</div>
                <div class="stat-label">今日完成</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="content-created">4</div>
                <div class="stat-label">内容产出</div>
            </div>
        </div>
        
        <div class="agents-grid" id="agents-grid">
            <div style="text-align: center; padding: 50px; color: var(--text-secondary);">正在加载...</div>
        </div>
        
        <div class="activity-section">
            <h3>📋 活动日志</h3>
            <div class="log-list" id="log-list">
                <div style="text-align: center; padding: 50px; color: var(--text-secondary);">正在加载...</div>
            </div>
        </div>
    </div>
    
    <script>
        const agents = [
            { id: 1, name: '天枢', role: '研究主管', avatar: '🧙', status: 'idle', task: null, progress: 0 },
            { id: 2, name: '地衡', role: '情报收集', avatar: '🔍', status: 'idle', task: null, progress: 0 },
            { id: 3, name: '文曲', role: '内容创作', avatar: '✍️', status: 'idle', task: null, progress: 0 },
            { id: 4, name: '明镜', role: '质量审核', avatar: '👁️', status: 'idle', task: null, progress: 0 }
        ];
        
        const logs = [
            { agent_id: 1, agent_name: '天枢', avatar: '🧙', message: '系统初始化完成', time: new Date() },
            { agent_id: 2, agent_name: '地衡', avatar: '🔍', message: '系统初始化完成', time: new Date() },
            { agent_id: 3, agent_name: '文曲', avatar: '✍️', message: '系统初始化完成', time: new Date() },
            { agent_id: 4, agent_name: '明镜', avatar: '👁️', message: '系统初始化完成', time: new Date() }
        ];
        
        function renderAgents() {
            document.getElementById('agents-grid').innerHTML = agents.map(agent => `
                <div class="agent-card">
                    <div class="agent-header">
                        <div class="agent-avatar">${agent.avatar}</div>
                        <div class="agent-info">
                            <h3>${agent.name}</h3>
                            <div class="agent-role">${agent.role}</div>
                        </div>
                        <div class="agent-status status-${agent.status}">
                            ${agent.status === 'idle' ? '🟢 空闲' : '🟠 工作中'}
                        </div>
                    </div>
                    <div class="agent-task">
                        <h4>当前任务</h4>
                        <p>${agent.task || '暂无任务'}</p>
                    </div>
                    ${agent.progress > 0 ? `
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${agent.progress}%"></div>
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }
        
        function renderLogs() {
            document.getElementById('log-list').innerHTML = logs.slice(0, 20).map(log => `
                <div class="log-item">
                    <div class="log-avatar">${log.avatar}</div>
                    <div class="log-content">
                        <div class="log-agent">${log.agent_name}</div>
                        <div class="log-message">${log.message}</div>
                    </div>
                    <div class="log-time">${new Date(log.time).toLocaleTimeString('zh-CN', {hour: '2-digit', minute:'2-digit', second:'2-digit'})}</div>
                </div>
            `).join('');
        }
        
        function simulateWork() {
            agents.forEach(agent => {
                if (Math.random() > 0.8) {
                    agent.status = agent.status === 'idle' ? 'busy' : 'idle';
                    agent.task = agent.status === 'busy' ? ['热点研究', '情报收集', '文案创作', '质量审核'][agent.id-1] : null;
                    agent.progress = agent.status === 'busy' ? Math.floor(Math.random() * 100) : 0;
                }
            });
            
            if (Math.random() > 0.5) {
                const agent = agents[Math.floor(Math.random() * agents.length)];
                if (agent.status === 'busy') {
                    logs.unshift({
                        agent_id: agent.id,
                        agent_name: agent.name,
                        avatar: agent.avatar,
                        message: agent.task,
                        time: new Date()
                    });
                    if (logs.length > 50) logs.pop();
                }
            }
        }
        
        function loadData() {
            simulateWork();
            renderAgents();
            renderLogs();
            
            const active = agents.filter(a => a.status === 'busy').length;
            document.getElementById('active-tasks').textContent = active;
        }
        
        loadData();
        setInterval(loadData, 5000);
    </script>
</body>
</html>

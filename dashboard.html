<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时监控仪表板 - AI Agent World</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f1115;
            --bg-secondary: #161920;
            --bg-card: #1c1f28;
            --bg-hover: #232732;
            --accent-primary: #3b82f6;
            --accent-success: #10b981;
            --accent-warning: #f59e0b;
            --accent-danger: #ef4444;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-color: #2d3342;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container { max-width: 1600px; margin: 0 auto; }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
        }
        
        .header-left h1 { font-size: 1.5em; font-weight: 600; margin-bottom: 5px; }
        .header-left p { color: var(--text-secondary); font-size: 0.9em; }
        
        .back-btn {
            padding: 10px 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9em;
            transition: all 0.2s;
        }
        .back-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
        
        .time-display {
            margin-bottom: 20px;
            padding: 15px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.9em;
        }
        
        .time-display div { margin: 5px 0; }
        
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .section-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 20px;
        }
        
        .section-title {
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .agents-list {
            display: grid;
            gap: 15px;
        }
        
        .agent-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: var(--bg-secondary);
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        .agent-item:hover {
            background: var(--bg-hover);
        }
        
        .agent-avatar {
            font-size: 2em;
            margin-right: 15px;
        }
        
        .agent-info { flex: 1; }
        
        .agent-name {
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .agent-role {
            font-size: 0.85em;
            color: var(--text-secondary);
        }
        
        .agent-status {
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.75em;
            font-weight: 500;
        }
        
        .status-idle { background: rgba(16, 185, 129, 0.15); color: var(--accent-success); }
        .status-busy { background: rgba(245, 158, 11, 0.15); color: var(--accent-warning); }
        
        .platform-stats {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .platform-stat {
            text-align: center;
            padding: 15px;
            background: var(--bg-secondary);
            border-radius: 8px;
        }
        
        .platform-icon { font-size: 2em; margin-bottom: 5px; }
        .platform-count { font-size: 1.5em; font-weight: 700; color: var(--accent-primary); }
        .platform-name { font-size: 0.8em; color: var(--text-secondary); margin-top: 5px; }
        
        .content-list {
            display: grid;
            gap: 10px;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .content-item {
            padding: 12px;
            background: var(--bg-secondary);
            border-radius: 6px;
            font-size: 0.85em;
            transition: all 0.2s;
            cursor: pointer;
        }
        
        .content-item:hover {
            background: var(--bg-hover);
        }
        
        .content-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        
        .author-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--bg-card);
            object-fit: cover;
        }
        
        .author-name {
            font-weight: 500;
            color: var(--text-secondary);
            font-size: 0.85em;
        }
        
        .content-title {
            font-weight: 500;
            margin-bottom: 5px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .content-link {
            color: var(--accent-primary);
            text-decoration: none;
            font-size: 0.8em;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-top: 5px;
        }
        
        .content-link:hover {
            text-decoration: underline;
        }
        
        .content-meta {
            display: flex;
            gap: 15px;
            color: var(--text-muted);
            font-size: 0.8em;
        }
        
        .stat-highlight {
            color: var(--accent-primary);
            font-weight: 600;
        }
        
        .loading { text-align: center; padding: 50px; color: var(--text-secondary); }
        
        .refresh-indicator {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: var(--accent-success);
            color: white;
            border-radius: 8px;
            font-size: 0.85em;
            display: none;
            animation: fadeIn 0.3s;
        }
        
        .platform-tab {
            transition: all 0.2s;
        }
        
        .platform-tab:hover {
            background: var(--bg-hover);
        }
        
        .platform-tab.active {
            background: var(--accent-primary);
            color: white;
            border-color: var(--accent-primary);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <h1>🎯 实时监控仪表板</h1>
                <p>AI 员工状态 · 多平台数据 · 实时更新</p>
            </div>
            <a href="/" class="back-btn">← 返回首页</a>
        </header>
        
        <div class="time-display">
            <div>🕐 当前时间：<strong id="current-time">加载中...</strong></div>
            <div>🕐 最后抓取：<strong id="last-crawl">加载中...</strong></div>
            <div>🕐 下次抓取：<strong id="next-crawl">加载中...</strong></div>
            <div>🔄 自动刷新：<strong>5 秒</strong></div>
        </div>
        
        <div class="platform-tabs" id="platform-tabs" style="margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap;">
            <div class="platform-tab active" data-platform="all" style="padding: 10px 20px; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px; cursor: pointer; font-size: 0.9em;">🌐 全部</div>
            <div class="platform-tab" data-platform="xiaohongshu" style="padding: 10px 20px; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px; cursor: pointer; font-size: 0.9em;">📕 小红书</div>
            <div class="platform-tab" data-platform="douyin" style="padding: 10px 20px; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px; cursor: pointer; font-size: 0.9em;">🎵 抖音</div>
            <div class="platform-tab" data-platform="kuaishou" style="padding: 10px 20px; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px; cursor: pointer; font-size: 0.9em;">📹 快手</div>
            <div class="platform-tab" data-platform="zhihu" style="padding: 10px 20px; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px; cursor: pointer; font-size: 0.9em;">📖 知乎</div>
            <div class="platform-tab" data-platform="videonumber" style="padding: 10px 20px; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px; cursor: pointer; font-size: 0.9em;">📺 视频号</div>
        </div>
        
        <div class="dashboard-grid">
            <!-- AI 员工状态 -->
            <div class="section-card">
                <div class="section-title">🤖 AI 员工状态</div>
                <div class="agents-list" id="agents-list">
                    <div class="loading">加载中...</div>
                </div>
            </div>
            
            <!-- 多平台统计 -->
            <div class="section-card">
                <div class="section-title">📊 多平台数据</div>
                <div class="platform-stats" id="platform-stats">
                    <div class="loading">加载中...</div>
                </div>
                <div style="margin-top: 20px;">
                    <div class="section-title" style="font-size: 0.9em; border: none; padding: 0;">📝 最新内容</div>
                    <div class="content-list" id="latest-content">
                        <div class="loading">加载中...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="refresh-indicator" id="refresh-indicator">🔄 数据已更新</div>
    
    <script>
        let currentPlatform = 'all';
        
        const platformIcons = {
            xiaohongshu: '📕',
            douyin: '🎵',
            kuaishou: '📹',
            zhihu: '📖',
            videonumber: '📺'
        };
        
        const platformNames = {
            xiaohongshu: '小红书',
            douyin: '抖音',
            kuaishou: '快手',
            zhihu: '知乎',
            videonumber: '视频号'
        };
        
        function switchPlatform(platform) {
            currentPlatform = platform;
            document.querySelectorAll('.platform-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.platform === platform);
            });
            loadPlatformData();
        }
        
        function updateTime() {
            const now = new Date();
            document.getElementById('current-time').textContent = now.toLocaleString('zh-CN');
            
            const minutes = now.getMinutes();
            const nextCrawl = new Date(now);
            nextCrawl.setMinutes(Math.floor(minutes / 10) * 10 + 10);
            nextCrawl.setSeconds(0);
            document.getElementById('next-crawl').textContent = nextCrawl.toLocaleTimeString('zh-CN', {hour: '2-digit', minute:'2-digit'});
            
            const lastCrawl = new Date(now);
            lastCrawl.setMinutes(Math.floor(minutes / 10) * 10);
            document.getElementById('last-crawl').textContent = lastCrawl.toLocaleTimeString('zh-CN', {hour: '2-digit', minute:'2-digit'});
        }
        
        function loadAgents() {
            fetch('/api/agents')
                .then(r => r.json())
                .then(data => {
                    const list = document.getElementById('agents-list');
                    list.innerHTML = data.agents.map(agent => `
                        <div class="agent-item">
                            <div class="agent-avatar">${agent.avatar}</div>
                            <div class="agent-info">
                                <div class="agent-name">${agent.name}</div>
                                <div class="agent-role">${agent.role}</div>
                            </div>
                            <div class="agent-status status-${agent.status}">
                                ${agent.status === 'idle' ? '🟢 空闲' : '🟠 工作中'}
                            </div>
                        </div>
                    `).join('');
                })
                .catch(err => console.error('加载 AI 员工失败:', err));
        }
        
        function loadPlatformData() {
            fetch(`/api/monitor-data?platform=${currentPlatform}`)
                .then(r => r.json())
                .then(data => {
                    // 平台统计
                    const statsDiv = document.getElementById('platform-stats');
                    const platforms = ['xiaohongshu', 'douyin', 'kuaishou', 'zhihu', 'videonumber'];
                    statsDiv.innerHTML = platforms.map(p => `
                        <div class="platform-stat">
                            <div class="platform-icon">${platformIcons[p]}</div>
                            <div class="platform-count">${data.stats[p] || 0}</div>
                            <div class="platform-name">${platformNames[p]}</div>
                        </div>
                    `).join('');
                    
                    // 最新内容
                    const contentDiv = document.getElementById('latest-content');
                    if (!data.content || data.content.length === 0) {
                        contentDiv.innerHTML = '<div class="loading">暂无内容</div>';
                    } else {
                        contentDiv.innerHTML = data.content.slice(0, 10).map(item => `
                            <div class="content-item" onclick="window.open('${item.content_url || '#'}', '_blank')">
                                <div class="content-header">
                                    ${item.author_avatar ? `<img src="${item.author_avatar}" class="author-avatar" alt="${item.author}">` : '<div class="author-avatar"></div>'}
                                    <span class="author-name">${item.author || '未知作者'}</span>
                                </div>
                                <div class="content-title">${item.title}</div>
                                ${item.content_url ? `<div class="content-link">🔗 查看详情</div>` : ''}
                                <div class="content-meta">
                                    <span>${platformIcons[item.platform]} ${platformNames[item.platform]}</span>
                                    <span>👁️ <span class="stat-highlight">${formatNumber(item.views)}</span></span>
                                    <span>❤️ <span class="stat-highlight">${formatNumber(item.likes)}</span></span>
                                </div>
                            </div>
                        `).join('');
                    }
                    
                    // 显示刷新提示
                    showRefreshIndicator();
                })
                .catch(err => console.error('加载平台数据失败:', err));
        }
        
        function formatNumber(num) {
            if (!num) return '0';
            if (num >= 10000) return (num / 10000).toFixed(1) + 'w';
            return num.toString();
        }
        
        function showRefreshIndicator() {
            const indicator = document.getElementById('refresh-indicator');
            indicator.style.display = 'block';
            setTimeout(() => {
                indicator.style.display = 'none';
            }, 2000);
        }
        
        // 绑定平台切换事件
        document.querySelectorAll('.platform-tab').forEach(tab => {
            tab.addEventListener('click', () => switchPlatform(tab.dataset.platform));
        });
        
        // 初始加载
        updateTime();
        loadAgents();
        loadPlatformData();
        
        // 定时刷新
        setInterval(updateTime, 1000);
        setInterval(loadAgents, 5000);
        setInterval(loadPlatformData, 5000);
    </script>
</body>
</html>

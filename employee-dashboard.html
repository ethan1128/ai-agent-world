<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>数字员工协作平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f1115;
            --bg-secondary: #161920;
            --bg-card: #1c1f28;
            --bg-hover: #232732;
            --accent-primary: #3b82f6;
            --accent-success: #10b981;
            --accent-warning: #f59e0b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-color: #2d3342;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container { max-width: 1600px; margin: 0 auto; }
        
        header {
            margin-bottom: 30px;
            padding: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
        }
        
        .header-title { font-size: 1.5em; font-weight: 600; margin-bottom: 5px; }
        .header-subtitle { color: var(--text-secondary); font-size: 0.9em; }
        
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 25px;
            background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-secondary) 100%);
            border: 1px solid var(--border-color);
            border-radius: 15px;
        }
        
        .calendar-date-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .calendar-date {
            font-size: 3em;
            font-weight: 700;
            color: var(--accent-primary);
            line-height: 1;
        }
        
        .calendar-weekday {
            font-size: 1.2em;
            font-weight: 500;
            color: var(--text-secondary);
        }
        
        .calendar-time {
            font-size: 1.5em;
            font-weight: 600;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
        }
        
        .calendar-visit-section {
            text-align: right;
            padding: 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            min-width: 200px;
        }
        
        .calendar-visit-label {
            font-size: 0.85em;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }
        
        .calendar-visit-value {
            font-size: 2.5em;
            font-weight: 700;
            color: var(--accent-primary);
        }
        
        @media (max-width: 768px) {
            .calendar-header {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }
            .calendar-visit-section {
                text-align: center;
            }
        }
        
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .stat-card:hover {
            border-color: var(--accent-primary);
            background: var(--bg-hover);
        }
        
        .stat-value { font-size: 2em; font-weight: 700; color: var(--accent-primary); }
        .stat-label { font-size: 0.85em; color: var(--text-secondary); margin-top: 5px; }
        
        .dashboard-grid {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
        }
        
        .employees-panel, .interactions-panel {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 20px;
        }
        
        .panel-title {
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .employee-list { display: flex; flex-direction: column; gap: 15px; }
        
        .employee-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
        }
        
        .employee-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }
        
        .employee-avatar { font-size: 2em; }
        .employee-name { font-weight: 600; margin-bottom: 3px; }
        .employee-role { font-size: 0.85em; color: var(--text-secondary); }
        
        .employee-status {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75em;
            font-weight: 500;
            margin-left: auto;
        }
        
        .status-idle { background: rgba(16, 185, 129, 0.15); color: var(--accent-success); }
        .status-working { background: rgba(245, 158, 11, 0.15); color: var(--accent-warning); }
        
        .interaction-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 600px;
            overflow-y: auto;
        }
        
        .interaction-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .interaction-item:hover {
            border-color: var(--accent-primary);
            background: var(--bg-hover);
        }
        
        .interaction-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            font-size: 0.85em;
        }
        
        .interaction-from { color: var(--accent-primary); font-weight: 500; }
        .interaction-arrow { color: var(--text-muted); }
        .interaction-to { color: var(--accent-success); font-weight: 500; }
        .interaction-type {
            display: inline-block;
            padding: 2px 8px;
            background: var(--bg-hover);
            border-radius: 4px;
            font-size: 0.75em;
            color: var(--text-muted);
            margin-left: 10px;
        }
        .interaction-time { margin-left: auto; color: var(--text-muted); font-size: 0.8em; }
        .interaction-message { color: var(--text-secondary); line-height: 1.6; font-size: 0.9em; white-space: pre-wrap; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .refresh-indicator {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: var(--accent-success);
            color: white;
            border-radius: 8px;
            font-size: 0.85em;
            display: none;
        }
        
        .filter-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 6px 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.2s;
        }
        
        .filter-btn:hover, .filter-btn.active {
            background: var(--accent-primary);
            color: white;
            border-color: var(--accent-primary);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="calendar-header">
            <div class="calendar-date-section">
                <div class="calendar-date" id="calendar-date">--</div>
                <div class="calendar-weekday" id="calendar-weekday">------</div>
                <div class="calendar-time" id="calendar-time">--:--:--</div>
            </div>
            <div class="calendar-visit-section">
                <div class="calendar-visit-label">👁️ 访问次数</div>
                <div class="calendar-visit-value" id="stat-visit">0</div>
            </div>
        </div>
        
        <header>
            <div class="header-title">🤖 数字员工协作平台</div>
            <div class="header-subtitle">
                <span style="display: inline-flex; align-items: center; gap: 8px;">
                    <span style="width: 8px; height: 8px; background: var(--accent-success); border-radius: 50%; animation: pulse 2s infinite;"></span>
                    实时直播员工交互
                </span>
            </div>
            <div style="margin-top: 15px;">
                <a href="https://github.com/ethan1128/ai-agent-world" target="_blank" style="display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-secondary); text-decoration: none; font-size: 0.85em; transition: all 0.2s;">
                    <svg style="width: 18px; height: 18px;" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                    GitHub 仓库
                </a>
            </div>
        </header>
        
        <div class="stats-bar">
            <div class="stat-card" onclick="alert('员工总数：' + document.getElementById('stat-employees').textContent)" title="点击查看员工详情">
                <div class="stat-value" id="stat-employees">0</div>
                <div class="stat-label">👥 员工数量</div>
            </div>
            <div class="stat-card" onclick="filterInteractions('all')" title="点击查看所有交互">
                <div class="stat-value" id="stat-interactions">0</div>
                <div class="stat-label">💬 交互次数</div>
            </div>
            <div class="stat-card" onclick="filterInteractions('pending')" title="点击查看进行中任务">
                <div class="stat-value" id="stat-tasks">0</div>
                <div class="stat-label">📋 进行中任务</div>
            </div>
            <div class="stat-card" onclick="window.location.href='/content-list.html'" title="点击查看产出内容">
                <div class="stat-value" id="stat-content">0</div>
                <div class="stat-label">📄 产出内容</div>
            </div>
            <div class="stat-card" onclick="filterInteractions('task_complete')" title="点击查看已完成任务">
                <div class="stat-value" id="stat-completed">0</div>
                <div class="stat-label">✅ 已完成任务</div>
            </div>
        </div>
        
        <div class="dashboard-grid">
            <div class="employees-panel">
                <div class="panel-title">👥 员工列表</div>
                <div class="employee-list" id="employee-list">
                    <div style="text-align: center; color: var(--text-secondary); padding: 20px;">加载中...</div>
                </div>
            </div>
            
            <div class="interactions-panel">
                <div class="panel-title">💬 交互记录</div>
                
                <div class="filter-bar">
                    <button class="filter-btn active" data-filter="all">全部</button>
                    <button class="filter-btn" data-filter="task_complete">✅ 已完成</button>
                    <button class="filter-btn" data-filter="task_assign">📋 任务分配</button>
                    <button class="filter-btn" data-filter="workflow_complete">🔄 工作流</button>
                </div>
                
                <div class="interaction-list" id="interaction-list">
                    <div style="text-align: center; color: var(--text-secondary); padding: 20px;">加载中...</div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="refresh-indicator" id="refresh-indicator">🔄 数据已更新</div>
    
    <script>
        let allInteractions = [];
        let currentFilter = 'all';
        
        function loadEmployees() {
            fetch('/api/employees')
                .then(r => r.json())
                .then(data => {
                    const list = document.getElementById('employee-list');
                    document.getElementById('stat-employees').textContent = data.employees.length;
                    
                    if (!data.employees || data.employees.length === 0) {
                        list.innerHTML = '<div style="text-align: center; color: var(--text-secondary); padding: 20px;">暂无员工</div>';
                        return;
                    }
                    
                    list.innerHTML = data.employees.map(emp => `
                        <div class="employee-card">
                            <div class="employee-header">
                                <div class="employee-avatar">${emp.avatar || '👤'}</div>
                                <div class="employee-info">
                                    <div class="employee-name">${emp.name}</div>
                                    <div class="employee-role">${emp.role}</div>
                                </div>
                                <div class="employee-status status-${emp.status || 'idle'}">
                                    ${emp.status === 'working' ? '🟠 工作中' : '🟢 空闲'}
                                </div>
                            </div>
                        </div>
                    `).join('');
                })
                .catch(err => console.error('加载员工失败:', err));
        }
        
        function loadInteractions() {
            Promise.all([
                fetch('/api/interactions?limit=10000').then(r => r.json()),
                fetch('/api/content').then(r => r.json()),
                fetch('/api/employees').then(r => r.json())
            ])
            .then(([interactionsData, contentData, employeesData]) => {
                allInteractions = interactionsData.interactions || [];
                
                // 统计交互次数（真实数据）
                document.getElementById('stat-interactions').textContent = allInteractions.length;
                
                // 统计进行中任务（真实数据）
                const pendingTasks = allInteractions.filter(int => 
                    int.task_type === 'task_assign' && int.status === 'pending'
                ).length;
                document.getElementById('stat-tasks').textContent = pendingTasks;
                
                // 统计已完成任务（真实数据）
                const completedTasks = allInteractions.filter(int => 
                    int.task_type === 'task_complete'
                ).length;
                document.getElementById('stat-completed').textContent = completedTasks;
                
                // 产出内容数量（真实数据）
                document.getElementById('stat-content').textContent = contentData.content?.length || 0;
                
                // 员工数量（真实数据）
                document.getElementById('stat-employees').textContent = employeesData.employees?.length || 0;
                
                // 更新日历统计卡片
                document.getElementById('stat-visit').textContent = parseInt(localStorage.getItem('dashboard-visit-count') || '0');
                
                // 保持当前筛选状态
                filterInteractions(currentFilter, false);
                
                showRefreshIndicator();
            })
            .catch(err => console.error('加载数据失败:', err));
        }
        
        function filterInteractions(filter, resetScroll = true) {
            currentFilter = filter;
            
            // 更新按钮状态
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.filter === filter);
            });
            
            let filtered = allInteractions;
            
            if (filter === 'task_complete') {
                filtered = allInteractions.filter(int => int.task_type === 'task_complete');
            } else if (filter === 'pending') {
                filtered = allInteractions.filter(int => int.task_type === 'task_assign' && int.status === 'pending');
            } else if (filter === 'task_assign') {
                filtered = allInteractions.filter(int => int.task_type === 'task_assign');
            } else if (filter === 'workflow_complete') {
                filtered = allInteractions.filter(int => int.task_type === 'workflow_complete');
            }
            
            renderInteractions(filtered);
            
            if (resetScroll) {
                document.getElementById('interaction-list').scrollTop = 0;
            }
        }
        
        function renderInteractions(interactions) {
            const list = document.getElementById('interaction-list');
            
            if (!interactions || interactions.length === 0) {
                list.innerHTML = '<div style="text-align: center; color: var(--text-secondary); padding: 20px;">暂无交互记录</div>';
                return;
            }
            
            list.innerHTML = interactions.map(int => `
                <div class="interaction-item" onclick="handleInteractionClick(${int.task_id})">
                    <div class="interaction-header">
                        <span class="interaction-from">${int.from_avatar || '👤'} ${int.from_name || int.from_employee}</span>
                        <span class="interaction-arrow">→</span>
                        <span class="interaction-to">${int.to_avatar || '👤'} ${int.to_name || int.to_employee}</span>
                        <span class="interaction-type">${int.task_type || '消息'}</span>
                        <span class="interaction-time">${formatTime(int.created_at)}</span>
                    </div>
                    <div class="interaction-message">${escapeHtml(int.message)}</div>
                </div>
            `).join('');
        }
        
        function handleInteractionClick(taskId) {
            if (taskId && taskId > 0) {
                window.location.href = '/task-detail.html?id=' + taskId;
            } else {
                alert('该交互没有关联任务\n\n提示：只有 task_complete 类型的交互才有关联的任务');
            }
        }
        
        function formatTime(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            const now = new Date();
            const diff = now - date;
            
            const datePart = date.toLocaleDateString('zh-CN', { month: '2-digit', day: '2-digit' });
            const timePart = date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            let relative = '';
            if (diff < 60000) relative = ' (刚刚)';
            else if (diff < 3600000) relative = ` (${Math.floor(diff / 60000)}分钟前)`;
            else if (diff < 86400000) relative = ` (${Math.floor(diff / 3600000)}小时前)`;
            
            return `${datePart} ${timePart}${relative}`;
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function showRefreshIndicator() {
            const indicator = document.getElementById('refresh-indicator');
            indicator.style.display = 'block';
            setTimeout(() => {
                indicator.style.display = 'none';
            }, 2000);
        }
        
        // 绑定筛选按钮事件
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                filterInteractions(this.dataset.filter);
            });
        });
        
        // 初始加载
        loadEmployees();
        loadInteractions();
        
        // 每 5 秒刷新
        setInterval(loadEmployees, 5000);
        setInterval(loadInteractions, 5000);
        
        // 更新时间组件
        function updateTime() {
            const now = new Date();
            
            // 更新日期
            const date = now.getDate();
            document.getElementById('calendar-date').textContent = date;
            
            // 更新星期
            const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const weekday = weekdays[now.getDay()];
            document.getElementById('calendar-weekday').textContent = weekday;
            
            // 更新时间
            const timeStr = now.toLocaleTimeString('zh-CN', { 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit' 
            });
            document.getElementById('calendar-time').textContent = timeStr;
        }
        
                // 更新访问次数 - 从 API 获取真实数据
        function updateVisitCount() {
            fetch('/api/visit-count')
                .then(r => r.json())
                .then(data => {
                    document.getElementById('stat-visit').textContent = data.total || 0;
                })
                .catch(() => {
                    // fallback: 使用 localStorage
                    const storageKey = 'dashboard-visit-count';
                    let count = parseInt(localStorage.getItem(storageKey) || '0');
                    count++;
                    localStorage.setItem(storageKey, count.toString());
                    document.getElementById('stat-visit').textContent = count;
                });
        }
        
        // 更新访问次数
        function updateVisitCount() {
            const storageKey = 'dashboard-visit-count';
            let count = parseInt(localStorage.getItem(storageKey) || '0');
            count++;
            localStorage.setItem(storageKey, count.toString());
            document.getElementById('visit-count').textContent = count;
        }
        
        // 每秒更新时间
        setInterval(updateTime, 1000);
        updateTime();
        
        // 更新访问次数
        updateVisitCount();
    </script>
</body>
</html>

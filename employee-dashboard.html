<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字员工协作平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f1115;
            --bg-secondary: #161920;
            --bg-card: #1c1f28;
            --bg-hover: #232732;
            --accent-primary: #3b82f6;
            --accent-success: #10b981;
            --accent-warning: #f59e0b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-color: #2d3342;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container { max-width: 1600px; margin: 0 auto; }
        
        header {
            margin-bottom: 30px;
            padding: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
        }
        
        .header-title {
            font-size: 1.5em;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .header-subtitle {
            color: var(--text-secondary);
            font-size: 0.9em;
        }
        
        .dashboard-grid {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .employees-panel {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 20px;
        }
        
        .panel-title {
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .employee-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .employee-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            transition: all 0.2s;
        }
        
        .employee-card:hover {
            border-color: var(--accent-primary);
        }
        
        .employee-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }
        
        .employee-avatar {
            font-size: 2em;
        }
        
        .employee-info {
            flex: 1;
        }
        
        .employee-name {
            font-weight: 600;
            margin-bottom: 3px;
        }
        
        .employee-role {
            font-size: 0.85em;
            color: var(--text-secondary);
        }
        
        .employee-status {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75em;
            font-weight: 500;
        }
        
        .status-idle {
            background: rgba(16, 185, 129, 0.15);
            color: var(--accent-success);
        }
        
        .status-working {
            background: rgba(245, 158, 11, 0.15);
            color: var(--accent-warning);
        }
        
        .interactions-panel {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 20px;
        }
        
        .interaction-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 600px;
            overflow-y: auto;
        }
        
        .interaction-item {
            cursor: pointer;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            transition: all 0.2s;
        }
        
        .interaction-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            font-size: 0.85em;
        }
        
        .interaction-from {
            color: var(--accent-primary);
            font-weight: 500;
        }
        
        .interaction-arrow {
            color: var(--text-muted);
        }
        
        .interaction-to {
            color: var(--accent-success);
            font-weight: 500;
        }
        
        .interaction-time {
            margin-left: auto;
            color: var(--text-muted);
            font-size: 0.8em;
        }
        
        .interaction-message {
            color: var(--text-secondary);
            line-height: 1.6;
            font-size: 0.9em;
        }
        
        .interaction-type {
            display: inline-block;
            padding: 2px 8px;
            background: var(--bg-hover);
            border-radius: 4px;
            font-size: 0.75em;
            color: var(--text-muted);
            margin-left: 10px;
        }
        
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 2em;
            font-weight: 700;
            color: var(--accent-primary);
        }
        
        .stat-label {
            font-size: 0.85em;
            color: var(--text-secondary);
            margin-top: 5px;
        }
        
        .refresh-indicator {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: var(--accent-success);
            color: white;
            border-radius: 8px;
            font-size: 0.85em;
            display: none;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-title">🤖 数字员工协作平台</div>
            <div class="header-subtitle">实时监控员工交互 · 每 5 秒自动刷新</div>
        </header>
        
        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-value" id="stat-employees">0</div>
                <div class="stat-label">员工数量</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-interactions">0</div>
                <div class="stat-label">交互次数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-tasks">0</div>
                <div class="stat-label">进行中任务</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-completed">0</div>
                <div class="stat-label">已完成任务</div>
            </div>
        </div>
        
        <div class="dashboard-grid">
            <div class="employees-panel">
                <div class="panel-title">👥 员工列表</div>
                <div class="employee-list" id="employee-list">
                    <div style="text-align: center; color: var(--text-secondary); padding: 20px;">加载中...</div>
                </div>
            </div>
            
            <div class="interactions-panel">
                <div class="panel-title">💬 交互记录</div>
                <div class="interaction-list" id="interaction-list">
                    <div style="text-align: center; color: var(--text-secondary); padding: 20px;">加载中...</div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="refresh-indicator" id="refresh-indicator">🔄 数据已更新</div>
    
    <script>
        function loadEmployees() {
            fetch('/api/employees')
                .then(r => r.json())
                .then(data => {
                    const list = document.getElementById('employee-list');
                    document.getElementById('stat-employees').textContent = data.employees.length;
                    
                    if (!data.employees || data.employees.length === 0) {
                        list.innerHTML = '<div style="text-align: center; color: var(--text-secondary); padding: 20px;">暂无员工</div>';
                        return;
                    }
                    
                    list.innerHTML = data.employees.map(emp => `
                        <div class="employee-card">
                            <div class="employee-header">
                                <div class="employee-avatar">${emp.avatar || '👤'}</div>
                                <div class="employee-info">
                                    <div class="employee-name">${emp.name}</div>
                                    <div class="employee-role">${emp.role}</div>
                                </div>
                                <div class="employee-status status-${emp.status || 'idle'}">
                                    ${emp.status === 'working' ? '🟠 工作中' : '🟢 空闲'}
                                </div>
                            </div>
                        </div>
                    `).join('');
                })
                .catch(err => console.error('加载员工失败:', err));
        }
        
        function loadInteractions() {
            fetch('/api/interactions?limit=50')
                .then(r => r.json())
                .then(data => {
                    const list = document.getElementById('interaction-list');
                    document.getElementById('stat-interactions').textContent = data.interactions.length;
                    
                    if (!data.interactions || data.interactions.length === 0) {
                        list.innerHTML = '<div style="text-align: center; color: var(--text-secondary); padding: 20px;">暂无交互记录</div>';
                        return;
                    }
                    
                    list.innerHTML = data.interactions.map(int => `
                        <div class="interaction-item">
                            <div class="interaction-header">
                                <span class="interaction-from">${int.from_avatar || '👤'} ${int.from_name || int.from_employee}</span>
                                <span class="interaction-arrow">→</span>
                                <span class="interaction-to">${int.to_avatar || '👤'} ${int.to_name || int.to_employee}</span>
                                <span class="interaction-type">${int.task_type || '消息'}</span>
                                <span class="interaction-time">${formatTime(int.created_at)}</span>
                            </div>
                            <div class="interaction-message">${int.message}</div>
                        </div>
                    `).join('');
                    
                    showRefreshIndicator();
                })
                .catch(err => console.error('加载交互失败:', err));
        }
        
        function formatTime(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return `${Math.floor(diff / 60000)}分钟前`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)}小时前`;
            return date.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
        }
        
        function showRefreshIndicator() {
            const indicator = document.getElementById('refresh-indicator');
            indicator.style.display = 'block';
            setTimeout(() => {
                indicator.style.display = 'none';
            }, 2000);
        }
        
        // 初始加载
        loadEmployees();
        loadInteractions();
        
        // 每 5 秒刷新
        setInterval(loadEmployees, 5000);
        setInterval(loadInteractions, 5000);
    </script>
</body>
</html>
